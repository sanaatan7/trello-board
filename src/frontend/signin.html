<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignIn — TaskFlow</title>
    <meta name="description" content="Sign in to your TaskFlow account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        font-family: "Inter", sans-serif;
        background: #fff;
        color: #000;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
      }

      /* ── Left: editorial ── */
      #right {
        width: 50%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        padding: 72px;
        position: relative;
        overflow: hidden;
        border-right: 1px solid #111;
      }

      .bg-number {
        position: absolute;
        bottom: -40px;
        right: -20px;
        font-family: "Funnel Display", sans-serif;
        font-size: 38vw;
        font-weight: 900;
        color: #111;
        line-height: 0.8;
        letter-spacing: -0.05em;
        pointer-events: none;
        user-select: none;
      }

      .right-eyebrow {
        font-size: 0.68rem;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .right-eyebrow::before {
        content: "";
        display: inline-block;
        width: 24px;
        height: 1px;
        background: #555;
      }

      .right-headline {
        font-family: "Funnel Display", sans-serif;
        font-size: 3rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.04em;
        line-height: 1.05;
        max-width: 360px;
        margin-bottom: 28px;
        position: relative;
        z-index: 1;
      }

      .right-body {
        font-size: 0.9rem;
        color: #666;
        line-height: 1.7;
        max-width: 320px;
        margin-bottom: 40px;
        position: relative;
        z-index: 1;
      }

      .right-dots {
        display: flex;
        gap: 6px;
        position: relative;
        z-index: 1;
      }
      .right-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #333;
      }
      .right-dots span.active {
        background: #fff;
        width: 20px;
        border-radius: 3px;
      }

      .right-brand {
        position: absolute;
        top: 72px;
        left: 72px;
        font-family: "Funnel Display", sans-serif;
        font-size: 1rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1;
      }
      .brand-mark {
        width: 26px;
        height: 26px;
        background: #fff;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-mark svg {
        width: 13px;
        height: 13px;
      }

      /* ── Right: form ── */
      #left {
        width: 50%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 80px 72px;
        background: #fff;
        position: relative;
        overflow: hidden;
      }

      #left h1 {
        font-family: "Funnel Display", sans-serif;
        font-size: 4.5rem;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.04em;
        margin-bottom: 20px;
        color: #000;
      }

      .form-subtitle {
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 52px;
        line-height: 1.6;
      }

      .field {
        width: 100%;
        max-width: 400px;
        margin-bottom: 12px;
      }
      .field-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 700;
        color: #aaa;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      #left input {
        width: 100%;
        padding: 14px 16px;
        font-size: 0.92rem;
        font-family: "Inter", sans-serif;
        background: #f8f8f8;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        color: #000;
        outline: none;
        transition: all 0.2s ease;
      }
      #left input::placeholder {
        color: #bbb;
      }
      #left input:focus {
        border-color: #000;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }

      #left button {
        width: 100%;
        max-width: 400px;
        margin-top: 10px;
        padding: 15px;
        font-size: 0.92rem;
        font-weight: 700;
        font-family: "Inter", sans-serif;
        letter-spacing: 0.04em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #000;
        color: #fff;
        transition: all 0.2s ease;
      }
      #left button:hover {
        background: #1a1a1a;
        transform: translateY(-1px);
      }
      #left button:active {
        transform: translateY(0);
        background: #333;
      }

      #left p {
        font-size: 0.83rem;
        color: #aaa;
        margin-top: 22px;
      }
      #left p a {
        color: #000;
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px solid #ccc;
        padding-bottom: 1px;
        transition: border-color 0.2s;
      }
      #left p a:hover {
        border-color: #000;
      }
    </style>
  </head>
  <body>
    <!-- Left: editorial (dark) -->
    <div id="right">
      <div class="bg-number">02</div>
      <div class="right-brand">
        <div class="brand-mark">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#000"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <path
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 12h6M9 16h4"
            />
          </svg>
        </div>
        TaskFlow
      </div>
      <span class="right-eyebrow">Welcome back</span>
      <h2 class="right-headline">Your workspace is waiting for you.</h2>
      <p class="right-body">
        Pick up exactly where you left off. All your boards, issues, and teams
        stay in sync.
      </p>
      <div class="right-dots">
        <span></span><span class="active"></span><span></span>
      </div>
    </div>

    <!-- Right: form (white) -->
    <div id="left">
      <h1>Sign<br />in.</h1>
      <p class="form-subtitle">Enter your credentials to continue.</p>

      <div class="field">
        <label class="field-label">Username</label>
        <input
          type="text"
          placeholder="yourname"
          id="nameInput"
          autocomplete="off"
        />
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" placeholder="••••••••••" id="passinput" />
      </div>

      <button>Sign in →</button>
      <p>Don't have an account? <a href="/">Sign up free</a></p>
    </div>

    <script>
      const nameInput = document.querySelector("#nameInput");
      const passwordInput = document.querySelector("#passinput");
      const signupButton = document.querySelector("#left button");
      signupButton.addEventListener("click", async () => {
        const userName = nameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!userName || !password) return;
        const response = await axios.post("/signin", { userName, password });
        localStorage.setItem("token", response.data.token);
        passwordInput.value = "";
        nameInput.value = "";
        window.location.href = "/organizations";
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizations — TaskFlow</title>
    <meta
      name="description"
      content="Create and manage your organizations on TaskFlow."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        font-family: "Inter", sans-serif;
        background: #fff;
        color: #000;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        user-select: none;
      }

      /* ── Topbar ── */
      .topbar {
        height: 52px;
        flex-shrink: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid #111;
      }
      .topbar-brand {
        font-family: "Funnel Display", sans-serif;
        font-size: 1rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .topbar-mark {
        width: 22px;
        height: 22px;
        background: #fff;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .topbar-mark svg {
        width: 11px;
        height: 11px;
      }

      .topbar-nav {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .topbar-nav span {
        font-size: 0.78rem;
        color: #555;
        font-weight: 500;
      }

      /* ── Layout ── */
      #main-layout {
        display: flex;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      /* ── Create section ── */
      #create-section {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 80px;
        width: 79%;
        position: relative;
      }

      .section-number {
        font-family: "Funnel Display", sans-serif;
        font-size: 7rem;
        font-weight: 900;
        color: #f0f0f0;
        line-height: 1;
        letter-spacing: -0.06em;
        margin-bottom: -28px;
        position: relative;
        z-index: 0;
        user-select: none;
      }

      #create-section h1 {
        font-family: "Funnel Display", sans-serif;
        font-size: 3.4rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #000;
        line-height: 1;
        margin-bottom: 14px;
        position: relative;
        z-index: 1;
      }
      #create-section h1 span {
        color: #000;
        text-decoration: underline;
        text-decoration-thickness: 3px;
        text-underline-offset: 5px;
      }

      #create-section .description {
        font-size: 0.92rem;
        color: #888;
        margin-bottom: 44px;
        max-width: 420px;
        line-height: 1.7;
        position: relative;
        z-index: 1;
      }

      .form-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
        max-width: 420px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .input-group label {
        font-size: 0.68rem;
        font-weight: 700;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      input,
      textarea {
        background: #f8f8f8;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 13px 16px;
        color: #000;
        font-size: 0.92rem;
        font-family: "Inter", sans-serif;
        transition: all 0.2s ease;
        outline: none;
        width: 100%;
      }
      input::placeholder,
      textarea::placeholder {
        color: #bbb;
      }
      input:focus,
      textarea:focus {
        border-color: #000;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }
      textarea {
        height: 100px;
        resize: none;
      }

      #create-btn {
        background: #000;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px 24px;
        font-size: 0.92rem;
        font-weight: 700;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        width: fit-content;
        min-width: 200px;
        transition: all 0.2s ease;
        letter-spacing: 0.03em;
      }
      #create-btn:hover {
        background: #222;
        transform: translateY(-1px);
      }
      #create-btn:active {
        transform: translateY(0);
        background: #333;
      }
      #create-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      /* ── Divider ── */
      .layout-divider {
        width: 1px;
        background: #e8e8e8;
        flex-shrink: 0;
      }

      /* ── Sidebar ── */
      #organizations-sidebar {
        width: 21%;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: #000;
      }

      .sidebar-header {
        padding: 24px 22px 18px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-header h2 {
        font-size: 0.65rem;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }
      .sidebar-header::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #fff;
        border-radius: 50%;
        flex-shrink: 0;
      }

      #all-org {
        flex: 1;
        overflow-y: auto;
        padding: 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #all-org::-webkit-scrollbar {
        width: 3px;
      }
      #all-org::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }

      .org-item {
        background: transparent;
        border: 1px solid #979595;
        border-radius: 10px;
        padding: 13px 16px;
        cursor: pointer;
        transition: all 0.18s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
        height: 50px;
      }
      .org-item::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #333;
        flex-shrink: 0;
        transition: all 0.2s ease;
      }
      .org-item:hover {
        background: #fff;
        border-color: #fff;
      }
      .org-item:hover::before {
        background: #000;
      }
      .org-item:hover p {
        color: #000;
      }
      .org-item:hover .org-arrow {
        color: #000;
      }

      .org-item p {
        font-size: 0.86rem;
        font-weight: 600;
        color: #ccc;
        flex: 1;
        letter-spacing: -0.01em;
      }
      .org-arrow {
        color: #333;
        font-size: 0.75rem;
        transition:
          color 0.18s,
          transform 0.18s;
      }
      .org-item:hover .org-arrow {
        transform: translateX(3px);
      }

      #loading-overlay {
        color: #444;
        font-size: 0.82rem;
        text-align: center;
        padding: 20px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 44px 20px;
      }
      .empty-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        border: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
      }
      .empty-title {
        font-size: 0.84rem;
        font-weight: 600;
        color: #555;
      }
      .empty-desc {
        font-size: 0.76rem;
        color: #333;
        text-align: center;
        line-height: 1.6;
        max-width: 180px;
      }
    </style>
  </head>
  <body style="user-select: none">
    <!-- Topbar -->
    <nav class="topbar">
      <div class="topbar-brand">
        <div class="topbar-mark">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#000"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <path
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 12h6"
            />
          </svg>
        </div>
        TaskFlow
      </div>
      <div class="topbar-nav"><span>Workspace</span></div>
    </nav>

    <div id="main-layout">
      <!-- Create Section -->
      <main id="create-section">
        <div class="section-number">03</div>
        <h1>New <span>Organization</span></h1>
        <p class="description">
          Create a dedicated workspace for your team, boards, and projects.
        </p>

        <div class="form-area">
          <div class="input-group">
            <label for="org-title">Organization name</label>
            <input
              type="text"
              id="org-title"
              placeholder="e.g. Acme Inc."
              autocomplete="off"
            />
          </div>
          <div class="input-group">
            <label for="org-desc">Description</label>
            <textarea
              id="org-desc"
              placeholder="What does this team work on?"
            ></textarea>
          </div>
          <button id="create-btn">Create organization →</button>
        </div>
      </main>

      <div class="layout-divider"></div>

      <!-- Sidebar -->
      <aside id="organizations-sidebar">
        <div class="sidebar-header">
          <h2>Your Organizations</h2>
        </div>
        <div id="loading-overlay" style="display: none">Loading...</div>
        <div id="all-org"></div>
      </aside>
    </div>

    <script>
      const organizationTitle = document.querySelector("#org-title");
      const orgdesc = document.querySelector("#org-desc");
      const orgBtn = document.querySelector("#create-btn");
      const orgsContainer = document.querySelector("#all-org");
      const loadingOverlay = document.querySelector("#loading-overlay");

      function showEmpty() {
        orgsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏢</div>
            <div class="empty-title">No organizations yet</div>
            <div class="empty-desc">Create your first to get started.</div>
          </div>`;
      }

      function openBoard() {
        document.querySelectorAll(".org-item").forEach((clickedOrg) => {
          clickedOrg.addEventListener("click", (e) => {
            e.stopPropagation();
            const title = clickedOrg.querySelector("p").innerText;
            localStorage.setItem("orgId", clickedOrg.id);
            localStorage.setItem("boardTitle", title);
            window.location.href = "/board";
          });
        });
      }

      async function getOrganizations() {
        loadingOverlay.style.display = "block";
        try {
          const token = localStorage.getItem("token");

          const response = await axios.get("/api/auth/org-info", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const orgData = response.data.userOrganizations;
          orgsContainer.innerHTML = "";
          if (!orgData || orgData.length === 0) {
            showEmpty();
            return;
          }
          orgData.forEach((org) => {
            const div = document.createElement("div");
            div.id = org._id;
            div.classList.add("org-item");
            div.innerHTML = `<p>${org.orgTitle}</p><span class="org-arrow">→</span>`;
            orgsContainer.appendChild(div);
          });
        } catch (error) {
          showEmpty();
        } finally {
          openBoard();
          loadingOverlay.style.display = "none";
        }
      }

      getOrganizations();

      orgBtn.addEventListener("click", async () => {
        const orgTitle = organizationTitle.value.trim();
        const description = orgdesc.value.trim();
        if (!orgTitle) {
          organizationTitle.focus();
          organizationTitle.style.borderColor = "#000";
          organizationTitle.style.boxShadow = "0 0 0 3px rgba(0,0,0,0.12)";
          setTimeout(() => {
            organizationTitle.style.borderColor = "";
            organizationTitle.style.boxShadow = "";
          }, 2000);
          return;
        }
        orgBtn.disabled = true;
        orgBtn.textContent = "Creating...";
        try {
          const token = localStorage.getItem("token");
          await axios.post(
            "/api/auth/org",
            { orgTitle, description },
            { headers: { Authorization: `Bearer ${token}` } },
          );
          organizationTitle.value = "";
          orgdesc.value = "";
          await getOrganizations();
        } catch (e) {
          console.error(e.message);
        } finally {
          orgBtn.disabled = false;
          orgBtn.textContent = "Create organization →";
        }
      });
    </script>
  </body>
</html>
